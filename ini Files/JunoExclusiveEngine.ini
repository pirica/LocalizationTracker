[PluginCVars_LowPriority]
r.Shadow.Virtual.Cache.ForceInvalidateDirectional=1

LFN.AutomaticReplayRecording=0
JunoPersistence.AcquirePlayerLock=0

FortAIPawn.ReplicateSimulatedAttributes=1

Fort.SmartObject.Player.EnableIgnoreTimeDiscrepancyWhenUsingSO=true
