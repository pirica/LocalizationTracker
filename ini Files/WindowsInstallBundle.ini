[InstallBundleManager.BundleSources]
!DefaultBundleSources=ClearArray
+DefaultBundleSources=Launcher
+DefaultBundleSources=GameCustom
+DefaultBundleSources=BuildPatchServices

[InstallBundleManager.FallbackBundleSources]
!FallbackBundleSources=ClearArray
FallbackBundleSources=(BuildPatchServices, Launcher)
+FallbackBundleSources=(Launcher, LauncherLegacy)
+FallbackBundleSources=(LauncherLegacy, FortBulk)

[InstallBundleManager.BundleCaches]
!BundleCaches=ClearArray
+BundleCaches=(Name=ContentOnDemand,Size=2147483648)

[InstallBundleManager.UEFNBundleSources]
!DefaultBundleSources=ClearArray
+DefaultBundleSources=Launcher
+DefaultBundleSources=GameCustom
+DefaultBundleSources=BuildPatchServices

[InstallBundleManager.UEFNFallbackBundleSources]
!FallbackBundleSources=ClearArray
FallbackBundleSources=(BuildPatchServices, Launcher)
+FallbackBundleSources=(Launcher, LauncherLegacy)

[InstallBundleDefinition GFP_BRCosmeticsInstallOnDemandFat]
Subsets=GFP_BRCosmeticsInstallOnDemandFat_EnableIAD
+Subsets=GFP_BRCosmeticsInstallOnDemandFat_DisableIAD

[InstallBundleSubsetDefinition GFP_BRCosmeticsInstallOnDemandFat_EnableIAD]
FileRegex=".*chunk100fatiad[^\d].*(pak|sig|uondemandtoc)"

[InstallBundleSubsetDefinition GFP_BRCosmeticsInstallOnDemandFat_DisableIAD]
FileRegex=".*chunk100fatiad[^\d].*(pak|sig|ucas|utoc)"

[InstallBundleDefinition GFP_BRCosmeticsInstallOnDemand]
PlatformChunkID=0
PlatformChunkName=BaseGameplay

[InstallBundleDefinition FortniteBROnDemand]
NeedsLauncherInstallIfEmpty=true
ExcludedBundleSources=BuildPatchServices

[InstallBundleDefinition FortniteBROnDemandOptional]
ExcludedBundleSources=BuildPatchServices

[InstallBundleDefinition GFP_BRRoot]
ExcludedBundleSources=BuildPatchServices

[InstallBundleDefinition GFP_BRRootOptional]
ExcludedBundleSources=BuildPatchServices

[InstallBundleDefinition GFP_CreativeRoot]
ExcludedBundleSources=BuildPatchServices

[InstallBundleDefinition GFP_CreativeRootOptional]
ExcludedBundleSources=BuildPatchServices

[InstallBundleDefinition GFP_JunoRoot]
ExcludedBundleSources=BuildPatchServices

[InstallBundleDefinition GFP_JunoRootOptional]
ExcludedBundleSources=BuildPatchServices

[InstallBundleDefinition GFP_DelMarRoot]
ExcludedBundleSources=BuildPatchServices

[InstallBundleDefinition GFP_DelMarRootOptional]
ExcludedBundleSources=BuildPatchServices

[InstallBundleDefinition GFP_Sparks]
ExcludedBundleSources=BuildPatchServices

[InstallBundleDefinition GFP_SparksOptional]
ExcludedBundleSources=BuildPatchServices

[InstallBundleDefinition GFP_SaveTheWorldRoot]
NeedsLauncherInstallIfEmpty=true
CloudAppNameOverride=FortniteStWContent
ExcludedBundleSources=BuildPatchServices

[InstallBundleDefinition GFP_SaveTheWorldRootOptional]
ExcludedBundleSources=BuildPatchServices
